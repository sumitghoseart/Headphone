<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="Login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    
    <div class="navbar">
        <div class="logo">
            <h1><span style="font-weight: 500; font-size: 1.7vw;">AROMA</span><span style="font-weight: 300;font-size: 1.7vw;">AUDIO CO.</span></h1>
        </div>
        <span><a href="headphns.html">Home</a></span>
        <span><a href="">Headphones</a></span>
        <span><a href="earbuds.html">Earbuds</a></span>
        <span><a href="">Accesseries</a></span>
        
        <div class="acc">
            <i class="fa-duotone fa-solid fa-user-tag"></i>
            <span><a href="" style="color: rgb(26, 142, 0); text-decoration: underline; ">Account</a></span>
        </div>
        <div class="cart">
            <i class="fa-solid fa-cart-flatbed-suitcase"></i>
            <span><a href="">Cart</a></span>
        </div>
        <div class="srch">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search">
        </div>
    </div>


    <div class="container">
        <div class="form">
            <div class="logologin">
                <h1>LOG-IN</h1>
            </div>
            <div class="shortlogo">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-google-plus-g"></i>
                <i class="fa-brands fa-linkedin-in"></i>
            </div>
            <div class="dtl">
                <div class="usernp">
                <i class="fa-solid fa-user-gear"></i>
                <input type="text" placeholder="Enter name" required>
                </div>

                <div class="usernp">
                <i class="fa-solid fa-lock"></i>
                <input type="text" placeholder="Password here" required>
                </div>
            </div>
            <div class="chkbx">
                <input type="checkbox">
                <label for="">Remember me</label>
            </div>
            <div class="btn">
                <button>LOG-IN</button>
            </div>
            <div class="forget">
                <a href="#">Forget Password?</a>
            </div>
            <div class="signup">
                <p style="color: rgb(108, 108, 108);">Not a member?   <a href="">Sign up now</a></p>
            </div>

        </div>
    </div>
